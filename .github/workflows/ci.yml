name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "TODO.md"
      - "LICENSE"
  pull_request:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "TODO.md"
      - "LICENSE"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-test:
    name: Build & test
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain
        run: swift --version

      - name: Resolve packages
        run: swift package resolve

      - name: Build
        run: swift build -c debug

      - name: Test
        run: swift test
