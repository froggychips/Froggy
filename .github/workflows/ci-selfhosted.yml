name: CI (self-hosted)

on:
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "TODO.md"
      - "LICENSE"
  pull_request:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "TODO.md"
      - "LICENSE"
  workflow_dispatch:

permissions:
  contents: read

# Single self-hosted runner — нет смысла очередить параллельные сборки одной ветки.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build & test (self-hosted)
    runs-on: [self-hosted, macOS, ARM64]
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4
        with:
          # Не очищаем workspace — сохраняем .build/checkouts/mlx-swift
          # между запусками. Self-hosted runner persistent, экономит ~minutes
          # на каждом билде против повторного git-clone mlx-swift.
          clean: false

      - name: Verify runner identity
        # Ловим «runner мигрировал на чужую тачку / x86 / старый macOS» сразу,
        # а не через swift-build-fail глубоко внутри MLX или metal.
        run: |
          test "$(uname -m)" = "arm64" || { echo "Not ARM64: $(uname -m)"; exit 1; }
          major=$(sw_vers -productVersion | cut -d. -f1)
          test "$major" -ge 14 || { echo "macOS < 14: $(sw_vers -productVersion)"; exit 1; }
          sw_vers
          sysctl -n machdep.cpu.brand_string

      - name: Show toolchain
        run: |
          swift --version
          xcrun -sdk macosx metal --version 2>&1 || true
          uname -a

      - name: Build (release + metallib pre-build + post-build copy)
        run: make release

      - name: Test
        run: make test
